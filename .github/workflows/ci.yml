name: ci

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck setup.sh lib/common.sh links.sh install/tools.sh
      - name: bash syntax check
        run: bash -n setup.sh lib/common.sh links.sh install/tools.sh

  link-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: link engine smoke test
        shell: bash
        run: |
          set -euo pipefail

          # Run setup.sh against a throwaway HOME so we never touch a real config.
          fake_home="$(mktemp -d)"

          # 1. A pre-existing REAL file is backed up, then replaced by a symlink.
          #    (Create it before the first link so the backup path is exercised.)
          mkdir -p "$fake_home/.config/nvim"
          echo "OLD CONTENT" > "$fake_home/.config/nvim/init.lua"
          HOME="$fake_home" ./setup.sh link
          test -L "$fake_home/.config/nvim/init.lua" \
            || { echo "FAIL: target not turned into a symlink"; exit 1; }
          ls "$fake_home"/.config/nvim/init.lua.bak.* >/dev/null 2>&1 \
            || { echo "FAIL: pre-existing file was not backed up"; exit 1; }
          test -L "$fake_home/.config/fish/conf.d/zz-dotfiles.fish" \
            || { echo "FAIL: managed conf.d fragment not linked"; exit 1; }

          # 2. Idempotent — a second run skips everything and makes no new backup.
          before="$(ls "$fake_home"/.config/nvim/init.lua.bak.* | wc -l)"
          HOME="$fake_home" ./setup.sh link
          after="$(ls "$fake_home"/.config/nvim/init.lua.bak.* | wc -l)"
          test "$before" -eq "$after" \
            || { echo "FAIL: re-run created a new backup (not idempotent)"; exit 1; }

          # 3. Rebuild after the link is removed.
          rm "$fake_home/.config/nvim/init.lua"
          HOME="$fake_home" ./setup.sh link
          test -L "$fake_home/.config/nvim/init.lua" \
            || { echo "FAIL: link not rebuilt after removal"; exit 1; }

          # 4. Our single fragment coexists with a foreign conf.d file untouched.
          conf="$fake_home/.config/fish/conf.d"
          echo "# tool generated" > "$conf/fnm.fish"
          HOME="$fake_home" ./setup.sh link
          test -f "$conf/fnm.fish" && test ! -L "$conf/fnm.fish" \
            || { echo "FAIL: foreign conf.d file was disturbed"; exit 1; }

          rm -rf "$fake_home"
          echo "link engine smoke test passed on ${{ matrix.os }}"
